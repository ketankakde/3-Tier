name: EKS Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform Action (create or destroy)"
        required: true
        default: "create"
        type: choice
        options:
          - create
          - destroy

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read    

    env:
      AWS_REGION: us-east-1
      CLUSTER_NAME: git-ops-cluster

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::160900807677:role/role-for-github-actions
        aws-region: us-east-1

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      working-directory: terraform
      run: terraform init

    - name: Terraform Validate
      working-directory: terraform
      run: terraform validate

    - name: Terraform Apply
      if: ${{ github.event.inputs.action == 'create' }}
      working-directory: terraform
      run: terraform apply -auto-approve

    - name: Configure kubectl
      if: ${{ github.event.inputs.action == 'create' }}
      run: |
        aws eks update-kubeconfig \
          --region $AWS_REGION \
          --name $CLUSTER_NAME

    - name: Install Metrics Server
      if: ${{ github.event.inputs.action == 'create' }}
      run: |
        kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml

    - name: Install Helm
      if: ${{ github.event.inputs.action == 'create' }}
      run: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

    - name: Login to DockerHub
      if: ${{ github.event.inputs.action == 'create' }}
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Images
      if: ${{ github.event.inputs.action == 'create' }}
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest ./frontend
        docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest ./backend

        docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest

    - name: Deploy MySQL
      if: ${{ github.event.inputs.action == 'create' }}
      run: |
        helm upgrade --install mysql ./helm/mysql

    - name: Deploy Backend
      if: ${{ github.event.inputs.action == 'create' }}
      run: |
        helm upgrade --install backend ./helm/backend \
          --set image.tag=latest

    - name: Deploy Frontend
      if: ${{ github.event.inputs.action == 'create' }}
      run: |
        helm upgrade --install frontend ./helm/frontend \
          --set image.tag=latest

    - name: Verify Pods
      if: ${{ github.event.inputs.action == 'create' }}
      run: |
        kubectl get pods
        kubectl get svc

    - name: Install Argo CD
      if: ${{ github.event.inputs.action == 'create' }}
      run: |
        helm repo add argo https://argoproj.github.io/argo-helm
        helm repo update

        kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -

        helm upgrade --install argocd argo/argo-cd \
        --namespace argocd

    - name: Wait for Argo CD
      if: ${{ github.event.inputs.action == 'create' }}
      run: |
        kubectl wait \
        --for=condition=available \
        deployment/argocd-server \
        -n argocd \
        --timeout=600s

    - name: Expose Argo CD
      if: ${{ github.event.inputs.action == 'create' }}
      run: |
        kubectl patch svc argocd-server -n argocd \
        -p '{"spec":{"type":"NodePort"}}'

    - name: Show Argo CD URL
      if: ${{ github.event.inputs.action == 'create' }}
      run: |
        kubectl get svc argocd-server -n argocd

    - name: Show Argo CD Admin Password
      if: ${{ github.event.inputs.action == 'create' }}
      run: |
        kubectl -n argocd get secret argocd-initial-admin-secret \
        -o jsonpath="{.data.password}" | base64 -d
        echo    

    - name: Terraform Destroy
      if: ${{ github.event.inputs.action == 'destroy' }}
      working-directory: terraform
      run: terraform destroy -auto-approve
